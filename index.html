<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FAQ</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      background: transparent;
      overflow-x: hidden;
    }

    .widget-wrap {
      width: 100%;
    }
    .elfsight-app-993111f2-dcb5-4fa5-8191-750efa146ee6,
.elfsight-app-993111f2-dcb5-4fa5-8191-750efa146ee6 * {
  font-family: 'Poppins', sans-serif !important;
}
  </style>

  <script src="https://static.elfsight.com/platform/platform.js" async></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="widget-wrap">
    <div class="elfsight-app-993111f2-dcb5-4fa5-8191-750efa146ee6" data-elfsight-app-lazy></div>
  </div>

<script>
  function sendHeight() {
    var height = Math.max(
      document.body.scrollHeight,
      document.body.offsetHeight,
      document.documentElement.scrollHeight
    );
    // Try both targeted origin and wildcard
    try { window.parent.postMessage({ elfsightHeight: height }, 'https://www.wsbcjonesboro.com'); } catch(e) {}
    try { window.parent.postMessage({ elfsightHeight: height }, '*'); } catch(e) {}
  }

  // Poll frequently
  setInterval(sendHeight, 300);

  window.addEventListener('load', function () {
    setTimeout(sendHeight, 500);
    setTimeout(sendHeight, 1500);
    setTimeout(sendHeight, 3000);
  });

  if (window.ResizeObserver) {
    var ro = new ResizeObserver(sendHeight);
    ro.observe(document.body);
  }

  // Also watch for any DOM mutations (accordion clicks)
  var mo = new MutationObserver(sendHeight);
  mo.observe(document.body, { childList: true, subtree: true, attributes: true });
</script>
</body>
</html>
