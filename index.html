<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FAQ</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      background: transparent;
      overflow-x: hidden;
    }

    .widget-wrap {
      width: 100%;
    }
  </style>

  <script src="https://static.elfsight.com/platform/platform.js" async></script>
</head>
<body>

  <div class="widget-wrap">
    <div class="elfsight-app-993111f2-dcb5-4fa5-8191-750efa146ee6" data-elfsight-app-lazy></div>
  </div>

  <script>
    function sendHeight() {
      var height = document.body.scrollHeight;
      window.parent.postMessage({ elfsightHeight: height }, '*');
    }

    // Poll every 200ms to catch accordion open/close
    setInterval(sendHeight, 200);

    // Fire after Elfsight finishes rendering
    window.addEventListener('load', function () {
      setTimeout(sendHeight, 1000);
      setTimeout(sendHeight, 2500);
    });

    // ResizeObserver as a backup
    if (window.ResizeObserver) {
      var ro = new ResizeObserver(sendHeight);
      ro.observe(document.body);
    }
  </script>

</body>
</html>
